<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Visual Bookmarks</title>
    <link rel="stylesheet" href="./main.css" />
  </head>
  <body>
    <div class="app-shell">
      <div class="toolbar">
        <input id="searchInput" type="search" placeholder="搜尋網站、網域..." />
        <label>截圖播放速度 <input id="previewSpeed" type="range" min="8" max="40" step="1" /></label>
      </div>
      <div class="layout-main">

        <!-- 左側：書籤資料夾 + 收藏夾 -->
        <aside class="sidebar">
          <div class="sidebar-title">資料夾</div>
          <ul id="folderList" class="menu-list">
            <li class="active" data-folder="all">全部</li>
          </ul>
          <button id="btnAddCollection" class="btn-add-col">＋ 新增收藏夾</button>
        </aside>

        <!-- 主內容 -->
        <main>
          <section id="grid" class="grid"></section>
        </main>

        <!-- 右側：功能 -->
        <aside class="sidebar">
          <div class="sidebar-title">功能</div>
          <ul class="menu-list" id="actionList">
            <li data-action="recent">最近觀看</li>
            <li data-action="favorite">我的最愛</li>
            <li data-action="random">隨機挑選 (5張)</li>
          </ul>
        </aside>

      </div>
    </div>

    <!-- 收藏夾編輯 Modal -->
    <div id="editColModal" class="modal-backdrop" style="display:none">
      <div class="modal-box">
        <div class="modal-header">
          <span>編輯收藏夾</span>
          <button id="editColClose" class="modal-close-btn">✕</button>
        </div>
        <div class="modal-body">
          <div id="editColList" class="edit-col-list"></div>
        </div>
        <div class="modal-footer">
          <button id="editColDone" class="btn-primary">完成</button>
        </div>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
