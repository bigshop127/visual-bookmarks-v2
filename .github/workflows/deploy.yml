name: Deploy Visual Bookmarks

on:
  push:
    branches:
      - main
  workflow_dispatch: 

concurrency:
  group: pages-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Initialize State
        run: |
          mkdir -p state
          echo '{"version":"1.0.0","items":{}}' > state/manifest.json

      - name: Run pipeline (skip Phase 2 screenshot)
        env:
          BOOKMARKS_INPUT: ./input/bookmarks/MYchrome_bookmarks.json
          ROOT_FOLDER_NAME: CM 作者
          SITE_BASE_PATH: /
        run: |
          npm run phase0
          npm run phase1
          npm run phase3

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4