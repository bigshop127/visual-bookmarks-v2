name: Deploy Visual Bookmarks

on:
  push:
    branches:
      - main
  workflow_dispatch: 

concurrency:
  group: pages-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Initialize State
        run: |
          mkdir -p state
          cat << 'EOF' > state/manifest.json
          {
            "version": 1,
            "items": {}
          }
          EOF

      - name: Run pipeline
        env:
          BOOKMARKS_INPUT: ./input/bookmarks/MYchrome_bookmarks.json
          ROOT_FOLDER_NAME: CM 作者
          SITE_BASE_PATH: /
        run: npm run update:all

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4